name: Build & Deploy EduTime

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build Docker image & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --build-arg GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            -t aristiderunco/edutime:latest \
            -t aristiderunco/edutime:${{ github.sha }} \
            .

      - name: Push to Docker Hub
        run: |
          docker push aristiderunco/edutime:latest
          docker push aristiderunco/edutime:${{ github.sha }}

      - name: Trigger Coolify redeploy
        run: |
          curl -s -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" || true
